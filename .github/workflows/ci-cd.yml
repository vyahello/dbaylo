name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Lint · type-check · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m venv venv
          venv/bin/pip install --upgrade pip
          venv/bin/pip install -e ".[dev]"
      - name: Lint (ruff)
        run: |
          venv/bin/ruff check src tests
          venv/bin/ruff format --check src tests
      - name: Type-check (mypy --strict)
        run: venv/bin/mypy
      - name: Test (pytest + coverage gate)
        run: venv/bin/python -m pytest --cov

  deploy:
    name: Deploy to VPS
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-vps
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
      - name: Rsync code to the VPS
        run: |
          rsync -az --delete \
            --exclude='.git' --exclude='.github' \
            --exclude='venv' --exclude='.venv' \
            --exclude='.env' --exclude='data' --exclude='*.db' --exclude='*.sqlite3' \
            --exclude='.claude' --exclude='__pycache__' \
            --exclude='.mypy_cache' --exclude='.ruff_cache' --exclude='.pytest_cache' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_APP_DIR }}/"
      - name: Install, migrate, restart on the VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "bash '${{ secrets.VPS_APP_DIR }}/deploy/deploy.sh'"
