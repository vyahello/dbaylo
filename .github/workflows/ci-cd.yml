name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Lint · type-check · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (editable + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff (lint + format)
        run: |
          ruff check src tests
          ruff format --check src tests
      - name: Mypy (types)
        run: mypy
      - name: Pytest (+ coverage gate)
        run: pytest --cov

  deploy:
    name: Deploy to VPS
    needs: test
    # only a real push to main, never PRs/forks; blocked unless `test` is green (needs:)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-vps
      cancel-in-progress: false
    steps:
      - name: Deploy over SSH (git pull + restart)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            APP_DIR="${APP_DIR:-$HOME/dbaylo}"
            REPO="${{ secrets.REPO_SSH_URL }}"
            REPO="${REPO:-git@github.com:vyahello/dbaylo.git}"
            # Set up a git checkout in place (works for a fresh dir or a pre-existing one).
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "No git checkout in $APP_DIR — initialising one"
              mkdir -p "$APP_DIR"
              git init -q "$APP_DIR"
              git -C "$APP_DIR" remote add origin "$REPO" 2>/dev/null \
                || git -C "$APP_DIR" remote set-url origin "$REPO"
            fi
            cd "$APP_DIR"
            git fetch --prune origin
            git reset --hard origin/main
            bash "$APP_DIR/deploy/deploy.sh"
